  type: Property
  assemblies:
  - ESRI.Server.GISClient
  namespace: ESRI.ArcGIS.GISClient
  summary: The connection name object for this server object.
  remarks: "&lt;P&gt;The name object for an&amp;nbsp;&lt;STRONG&gt;AGSServerConnection. &lt;/STRONG&gt;The &lt;STRONG&gt;AGSServerConnectionName &lt;/STRONG&gt;for an&amp;nbsp;AGSServerConnection can be persisted, for example, in a map document. An application can call the &lt;STRONG&gt;&lt;A href=\"JavaScript:Jump('esriSystem/IName_Open.htm')\"&gt;Open&lt;/A&gt; &lt;/STRONG&gt;method on the &lt;STRONG&gt;AGSServerConnectionName&lt;/STRONG&gt; after loading it from persistent storage in order to connect to and get an object reference to the GIS server or web service catalog.&lt;/P&gt;"
  example:
  - >-
    <codeTitle>Sample Snippet</codeTitle>

    <pre><code class="lang-csharp"></code></pre>
