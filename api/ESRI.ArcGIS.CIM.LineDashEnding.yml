  langs:
  - csharp
  - vb
  name: LineDashEnding
  nameWithType: LineDashEnding
  fullName: ESRI.ArcGIS.CIM.LineDashEnding
  type: Enum
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: Determines how the strokes with dash patterns and other patterns (tiled pictures, placement effects) are handled at the end points of the line geometry's segments.
  remarks: If more than one pattern exists (for example, a dashed simple stroke, a hash stroke, and a marker stroke) then the longest pattern's length is affected directly by this option and the rest of the stroke patterns are resized proportionately to match.
  example: []
  syntax:
    content: public enum LineDashEnding
    content.vb: Public Enum LineDashEnding
