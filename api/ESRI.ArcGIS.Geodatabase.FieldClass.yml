    content: virtual IGeometryDef IFieldEdit_GeometryDef_2 { set; }
    parameters: []
    return:
      type: ESRI.ArcGIS.Geodatabase.IGeometryDef
    content.vb: Overridable WriteOnly Property IFieldEdit_GeometryDef_2 As IGeometryDef
