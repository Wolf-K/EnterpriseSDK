  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '0: densify parameter is curve length increment. Output line segments will be no longer than this. This method cannot be used when constructing geodesic circles or ellipses.'
