  nameWithType: esriCurveDensifyMethod.esriCurveDensifyByAngle
  fullName: ESRI.ArcGIS.Geometry.esriCurveDensifyMethod.esriCurveDensifyByAngle
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '1: densify parameter is angle increment. Line segments will become shorter as the curvature increases. For geodesic ellipses, the angle is with respect to the reference circle.'
  example: []
  syntax:
    content: esriCurveDensifyByAngle = 1
    return:
      type: ESRI.ArcGIS.Geometry.esriCurveDensifyMethod
- uid: ESRI.ArcGIS.Geometry.esriCurveDensifyMethod.esriCurveDensifyByDeviation
