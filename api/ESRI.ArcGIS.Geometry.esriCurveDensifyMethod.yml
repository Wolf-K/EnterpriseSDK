  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '2: densify parameter is deviation from true curve. Line segments of varying length will be generated. The curve parameter specifies the maximum allowable distance between a line segment and the portion of the curve that it is approximating.'
  example: []
  syntax:
    content: esriCurveDensifyByDeviation = 2
    return:
      type: ESRI.ArcGIS.Geometry.esriCurveDensifyMethod
