    content: esriCurveDensifyByLength = 0
    return:
      type: ESRI.ArcGIS.Geometry.esriCurveDensifyMethod
- uid: ESRI.ArcGIS.Geometry.esriCurveDensifyMethod.esriCurveDensifyByAngle
