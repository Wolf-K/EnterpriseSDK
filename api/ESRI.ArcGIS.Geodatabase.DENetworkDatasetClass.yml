  type: Property
  assemblies:
  - ESRI.Server.Geodatabase
  namespace: ESRI.ArcGIS.Geodatabase
  summary: The database configuration keyword for the network dataset.
  remarks: >-
    &lt;p&gt;Configuration keywords can be of two types:&lt;/p&gt;

    &lt;ul&gt;

    &lt;li&gt;esriConfigurationKeywordGeneral, which references storage

    parameters for creating feature classes and tables&lt;/li&gt;

    &lt;li&gt;esriConfigurationKeywordNetwork, which references storage

    parameters for creating geometric networks or network datasets&lt;/li&gt;

    &lt;li&gt;esriConfigurationKeywordTopology, which references storage

    parameters for creating topologies&lt;/li&gt;

    &lt;/ul&gt;

    &lt;p&gt;An enumeration of &lt;strong&gt;ConfigurationKeyword&lt;/strong&gt; objects

    for an ArcSDE or File geodatabase workspace is returned by the

    &lt;strong&gt;IWorkspaceConfiguration&lt;/strong&gt; interface.&lt;/p&gt;
