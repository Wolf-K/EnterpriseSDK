- uid: ESRI.ArcGIS.CIM.CIMCompositeTextPartPosition.IsPartWithinCalloutBox
  commentId: P:ESRI.ArcGIS.CIM.CIMCompositeTextPartPosition.IsPartWithinCalloutBox
  id: IsPartWithinCalloutBox
  parent: ESRI.ArcGIS.CIM.CIMCompositeTextPartPosition
  langs:
  - csharp
  - vb
  name: IsPartWithinCalloutBox
  nameWithType: CIMCompositeTextPartPosition.IsPartWithinCalloutBox
  fullName: ESRI.ArcGIS.CIM.CIMCompositeTextPartPosition.IsPartWithinCalloutBox
  type: Property
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: >-
    Gets or sets a value indicating whether the text part will be contained within the main callout.

    If this is set to true, the main callout will expand to encompass this text part,

    and a line will be draw separating the part from the rest of the callout.

    This line will have the same symbol as the callout outline and will only draw if

    the text part is above or below the top and bottom margins of the middle text.
  example: []
  syntax:
    content: public bool IsPartWithinCalloutBox { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property IsPartWithinCalloutBox As Boolean
  overload: ESRI.ArcGIS.CIM.CIMCompositeTextPartPosition.IsPartWithinCalloutBox*
