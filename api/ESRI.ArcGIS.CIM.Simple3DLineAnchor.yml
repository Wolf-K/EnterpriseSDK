items:
- uid: ESRI.ArcGIS.CIM.Simple3DLineAnchor
  commentId: T:ESRI.ArcGIS.CIM.Simple3DLineAnchor
  id: Simple3DLineAnchor
  parent: ESRI.ArcGIS.CIM
  children:
  - ESRI.ArcGIS.CIM.Simple3DLineAnchor.Bottom
  - ESRI.ArcGIS.CIM.Simple3DLineAnchor.Center
  - ESRI.ArcGIS.CIM.Simple3DLineAnchor.Top
  langs:
  - csharp
  - vb
  name: Simple3DLineAnchor
  nameWithType: Simple3DLineAnchor
  fullName: ESRI.ArcGIS.CIM.Simple3DLineAnchor
  type: Enum
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: >-
    Defines the vertical anchor used to render the simple 3D line style in relation to the ground in 3D.

    This property is ignored for the Strip style which is drawn flat upon the surface, and for the Wall

    style which always uses a Bottom anchor.
  example: []
  syntax:
    content: public enum Simple3DLineAnchor
    content.vb: Public Enum Simple3DLineAnchor
- uid: ESRI.ArcGIS.CIM.Simple3DLineAnchor.Center
  commentId: F:ESRI.ArcGIS.CIM.Simple3DLineAnchor.Center
  id: Center
  parent: ESRI.ArcGIS.CIM.Simple3DLineAnchor
  langs:
  - csharp
  - vb
  name: Center
  nameWithType: Simple3DLineAnchor.Center
  fullName: ESRI.ArcGIS.CIM.Simple3DLineAnchor.Center
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: >-
    The center of the 3D line style is vertically aligned with the ground.

    The 3D line style is rendered both above and under the ground as a result.
  example: []
  syntax:
    content: Center = 0
    return:
      type: ESRI.ArcGIS.CIM.Simple3DLineAnchor
- uid: ESRI.ArcGIS.CIM.Simple3DLineAnchor.Bottom
  commentId: F:ESRI.ArcGIS.CIM.Simple3DLineAnchor.Bottom
  id: Bottom
  parent: ESRI.ArcGIS.CIM.Simple3DLineAnchor
  langs:
  - csharp
  - vb
  name: Bottom
  nameWithType: Simple3DLineAnchor.Bottom
  fullName: ESRI.ArcGIS.CIM.Simple3DLineAnchor.Bottom
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The 3D line style is rendered above the ground as the vertical anchor is set to the bottom of the style.
  example: []
  syntax:
    content: Bottom = 1
    return:
      type: ESRI.ArcGIS.CIM.Simple3DLineAnchor
- uid: ESRI.ArcGIS.CIM.Simple3DLineAnchor.Top
  commentId: F:ESRI.ArcGIS.CIM.Simple3DLineAnchor.Top
  id: Top
  parent: ESRI.ArcGIS.CIM.Simple3DLineAnchor
  langs:
  - csharp
  - vb
  name: Top
  nameWithType: Simple3DLineAnchor.Top
  fullName: ESRI.ArcGIS.CIM.Simple3DLineAnchor.Top
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The 3D line style is rendered under the ground as the vertical anchor is set to the top of the style.
  example: []
  syntax:
    content: Top = 2
    return:
      type: ESRI.ArcGIS.CIM.Simple3DLineAnchor
