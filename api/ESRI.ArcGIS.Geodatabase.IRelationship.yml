  type: Property
  assemblies:
  - ESRI.Server.Geodatabase
  namespace: ESRI.ArcGIS.Geodatabase
  summary: The relationship class to which this relationship belongs.
  remarks: '&lt;P&gt;You can create a relationship class with either &lt;STRONG&gt;IRelationshipClassContainer &lt;/STRONG&gt;or &lt;STRONG&gt;IFeatureWorkspace&lt;/STRONG&gt;. &lt;STRONG&gt;RelationshipClass &lt;/STRONG&gt;objects implement &lt;STRONG&gt;IDataset &lt;/STRONG&gt;(useful for getting the name or the workspace), but note that they do not implement &lt;STRONG&gt;IClass &lt;/STRONG&gt;(unless they are attributed). This is because a non-attributed relationship class does not have any fields of its own.&lt;/P&gt;'
