  summary: Represents a polar continuous color ramp scheme.
  remarks: A color ramp scheme that has a polar transition between two colors. This scheme uses the HSV algorithm which uses a path around the color wheel to transition the hue, saturation, and value of the beginning color to the hue, saturation, and value of the ending color.
