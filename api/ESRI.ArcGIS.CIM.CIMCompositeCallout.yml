  name: BottomLeft
  nameWithType: CIMCompositeCallout.BottomLeft
  fullName: ESRI.ArcGIS.CIM.CIMCompositeCallout.BottomLeft
  type: Property
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: >-
    Gets or sets the text part position properties for the bottom left part of the callout text.

    This contains the relative positioning information, as well as split offset indicating

    the extent to which the callout part will mask the callout outline, and whether or not the

    part should be boxed in by the overall callout, or not.
  example: []
  syntax:
    content: public CIMCompositeTextPartPosition BottomLeft { get; set; }
    parameters: []
    return:
      type: ESRI.ArcGIS.CIM.CIMCompositeTextPartPosition
    content.vb: Public Property BottomLeft As CIMCompositeTextPartPosition
  overload: ESRI.ArcGIS.CIM.CIMCompositeCallout.BottomLeft*
