- uid: ESRI.ArcGIS.CIM.CIMCompositeCallout.Floating
  commentId: P:ESRI.ArcGIS.CIM.CIMCompositeCallout.Floating
  id: Floating
  parent: ESRI.ArcGIS.CIM.CIMCompositeCallout
  langs:
  - csharp
  - vb
  name: Floating
  nameWithType: CIMCompositeCallout.Floating
  fullName: ESRI.ArcGIS.CIM.CIMCompositeCallout.Floating
  type: Property
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: >-
    Gets or sets the text part position properties for the floating part of the callout text.

    This contains the relative positioning information, as well as split offset indicating

    the extent to which the callout part will mask the callout outline, and whether or not the

    part should be boxed in by the overall callout, or not. The floating part is anchored below

    the bottom text part. If there is no bottom text part it is anchored below the middle text part

    plus margins.
  example: []
  syntax:
    content: public CIMCompositeTextPartPosition Floating { get; set; }
    parameters: []
    return:
      type: ESRI.ArcGIS.CIM.CIMCompositeTextPartPosition
    content.vb: Public Property Floating As CIMCompositeTextPartPosition
  overload: ESRI.ArcGIS.CIM.CIMCompositeCallout.Floating*
