  commentId: P:ESRI.ArcGIS.DatasourcesFile.BimFileWorkspaceClass.Workspace
  id: Workspace
  isEii: true
  parent: ESRI.ArcGIS.DatasourcesFile.BimFileWorkspaceClass
  langs:
  - csharp
