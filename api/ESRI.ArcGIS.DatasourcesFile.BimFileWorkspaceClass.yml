  type: Property
  assemblies:
  - ESRI.Server.DatasourcesFile
  namespace: ESRI.ArcGIS.DatasourcesFile
  summary: The factory that created the workspace.
  remarks: >-
    &lt;CODE&gt;

    &lt;P&gt;A WorkspaceFactory is a dispenser of workspaces and allows a client to connect to a workspace specified by a set of connection properties. A workspace represents a database or a datasource that contains one or more datasets. Examples of datasets include tables, feature classes and relationship classes. A WorkspaceFactory is a cocreatable, singleton object. A WorkspaceFactory maintains a pool of currently connected, active workspaces that are being referenced by the application. Connection properties are specified using a PropertySet object and can be saved to a connection file. A WorkspaceFactory also supports methods that can be used to browse and manage file system workspaces, and methods to manage connection files for remote database workspaces.&lt;/P&gt;&lt;/CODE&gt;
  example:
  - >-
    <codeTitle>Sample Snippet</codeTitle>

