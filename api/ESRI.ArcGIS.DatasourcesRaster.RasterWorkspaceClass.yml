  commentId: P:ESRI.ArcGIS.DatasourcesRaster.RasterWorkspaceClass.WorkspaceFactory
  id: WorkspaceFactory
  isEii: true
  parent: ESRI.ArcGIS.DatasourcesRaster.RasterWorkspaceClass
  langs:
  - csharp
