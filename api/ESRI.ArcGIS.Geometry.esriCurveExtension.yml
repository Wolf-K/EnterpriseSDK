- uid: ESRI.ArcGIS.Geometry.esriCurveExtension.esriDefaultCurveExtension
  commentId: F:ESRI.ArcGIS.Geometry.esriCurveExtension.esriDefaultCurveExtension
  id: esriDefaultCurveExtension
  parent: ESRI.ArcGIS.Geometry.esriCurveExtension
  langs:
  - csharp
  - vb
  name: esriDefaultCurveExtension
  nameWithType: esriCurveExtension.esriDefaultCurveExtension
  fullName: ESRI.ArcGIS.Geometry.esriCurveExtension.esriDefaultCurveExtension
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '0: By default, extension considers both ends of paths. The old ends remain and new points are added at the extended ends. The new points have attributes that are extrapolated from adjacent existing segments.'
  example: []
  syntax:
    content: esriDefaultCurveExtension = 0
    return:
      type: ESRI.ArcGIS.Geometry.esriCurveExtension
- uid: ESRI.ArcGIS.Geometry.esriCurveExtension.esriRelocateEnds
  commentId: F:ESRI.ArcGIS.Geometry.esriCurveExtension.esriRelocateEnds
  id: esriRelocateEnds
  parent: ESRI.ArcGIS.Geometry.esriCurveExtension
  langs:
  - csharp
  - vb
  name: esriRelocateEnds
  nameWithType: esriCurveExtension.esriRelocateEnds
  fullName: ESRI.ArcGIS.Geometry.esriCurveExtension.esriRelocateEnds
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '1: If an extension is performed at an end, relocate the end point to the new position instead of leaving the old point and adding a new point at the new position.'
  example: []
  syntax:
    content: esriRelocateEnds = 1
    return:
      type: ESRI.ArcGIS.Geometry.esriCurveExtension
- uid: ESRI.ArcGIS.Geometry.esriCurveExtension.esriKeepEndAttributes
  commentId: F:ESRI.ArcGIS.Geometry.esriCurveExtension.esriKeepEndAttributes
  id: esriKeepEndAttributes
  parent: ESRI.ArcGIS.Geometry.esriCurveExtension
  langs:
  - csharp
  - vb
  name: esriKeepEndAttributes
  nameWithType: esriCurveExtension.esriKeepEndAttributes
  fullName: ESRI.ArcGIS.Geometry.esriCurveExtension.esriKeepEndAttributes
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: "2: If an extension is performed at an end, do not extrapolate the end-segment's attributes for the new point. Instead, make its attributes the same as the current end. Incompatible with esriNoAttributes."
  example: []
  syntax:
    content: esriKeepEndAttributes = 2
    return:
      type: ESRI.ArcGIS.Geometry.esriCurveExtension
- uid: ESRI.ArcGIS.Geometry.esriCurveExtension.esriNoEndAttributes
  commentId: F:ESRI.ArcGIS.Geometry.esriCurveExtension.esriNoEndAttributes
  id: esriNoEndAttributes
  parent: ESRI.ArcGIS.Geometry.esriCurveExtension
  langs:
  - csharp
  - vb
  name: esriNoEndAttributes
  nameWithType: esriCurveExtension.esriNoEndAttributes
  fullName: ESRI.ArcGIS.Geometry.esriCurveExtension.esriNoEndAttributes
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: "4: If an extension is performed at an end, do not extrapolate the end-segment's attributes for the new point. Instead, make its attributes be empty. Incompatible with esriKeepAttributes."
  example: []
  syntax:
    content: esriNoEndAttributes = 4
    return:
      type: ESRI.ArcGIS.Geometry.esriCurveExtension
