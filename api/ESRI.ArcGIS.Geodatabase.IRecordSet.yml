- uid: ESRI.ArcGIS.Geodatabase.IRecordSet.Table
  commentId: P:ESRI.ArcGIS.Geodatabase.IRecordSet.Table
  id: Table
  parent: ESRI.ArcGIS.Geodatabase.IRecordSet
  langs:
  - csharp
  - vb
  name: Table
  nameWithType: IRecordSet.Table
  fullName: ESRI.ArcGIS.Geodatabase.IRecordSet.Table
  type: Property
  assemblies:
  - ESRI.Server.Geodatabase
  namespace: ESRI.ArcGIS.Geodatabase
  summary: The source table or feature class for the recordset.
  remarks: >-
    &lt;P&gt;A &lt;STRONG&gt;Table &lt;/STRONG&gt;object has one or more columns, referred to as fields, and contains an unordered collection of rows. Each row has for each field exactly one value in the data type of the field.&lt;/P&gt;

    &lt;P&gt;A &lt;STRONG&gt;Table &lt;/STRONG&gt;is a &lt;STRONG&gt;Dataset &lt;/STRONG&gt;and properties such as the name of the table, the persistable name object for the table, and the workspace containing the table, may be obtained via the &lt;STRONG&gt;IDataset &lt;/STRONG&gt;interface. In relational terms, a &lt;STRONG&gt;Table &lt;/STRONG&gt;object represents an RDBMS table or view. In objected-oriented terms, a Table object represents an ObjectClass or a RelationshipClass in a geodatabase. A &lt;STRONG&gt;Table &lt;/STRONG&gt;object hands out &lt;STRONG&gt;Row &lt;/STRONG&gt;objects which themselves support application callable methods depending on the type of data stored in the table.&lt;/P&gt;

    &lt;P&gt;The &lt;STRONG&gt;Name &lt;/STRONG&gt;property of a &lt;STRONG&gt;Table&lt;/STRONG&gt;, accessible via the &lt;STRONG&gt;IDataset &lt;/STRONG&gt;interface, returns its fully qualified name. The level of qualification may vary depending on the host DBMS. For example, a table named ‘pipes’, owned by a user named ‘gas’ may be called ‘pipes’ in and Access or File Geodatabase, ‘gas.pipes’ on Oracle and ‘mydb.gas.pipes’ on SQLServer. The &lt;STRONG&gt;ParseTableNamemethod &lt;/STRONG&gt;on the &lt;STRONG&gt;ISqlSyntax &lt;/STRONG&gt;interface supported by the table’s workspace can be used to split the fully qualified name into its components.&lt;/P&gt;
  example:
  - >-
    <codeTitle>Sample Snippet</codeTitle>

    <pre><code class="lang-csharp"></code></pre>
  syntax:
    content: ITable Table { get; }
    parameters: []
    return:
      type: ESRI.ArcGIS.Geodatabase.ITable
    content.vb: ReadOnly Property Table As ITable
  overload: ESRI.ArcGIS.Geodatabase.IRecordSet.Table*
