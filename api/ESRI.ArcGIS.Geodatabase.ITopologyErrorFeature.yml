  type: Property
  assemblies:
  - ESRI.Server.Geodatabase
  namespace: ESRI.ArcGIS.Geodatabase
  summary: The topology rule that caused the topology error.
  remarks: '&lt;P&gt;The &lt;STRONG&gt;TopologyRule&lt;/STRONG&gt; class is used to define the permissible spatial relationships between features within a topology.&amp;nbsp; Topology rules can be defined with a single feature class or between two feature classes.&amp;nbsp; Topology rules can also be defined to the subtype level of a feature class.&amp;nbsp; Topology rules have an origin and a destination feature class, either of which can be set to the subtype level.&amp;nbsp; Depending on the type of topology rule that is implemented, the destination feature class properties may be irrelevant.&lt;/P&gt;'
  example:
  - >-
    <codeTitle>Sample Snippet</codeTitle>

    <pre><code class="lang-csharp"></code></pre>
