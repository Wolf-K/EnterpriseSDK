- uid: ESRI.ArcGIS.Geodatabase.ITopologyProtectNames.ObjectClass
  commentId: M:ESRI.ArcGIS.Geodatabase.ITopologyProtectNames.ObjectClass
  id: ObjectClass
  parent: ESRI.ArcGIS.Geodatabase.ITopologyProtectNames
  langs:
  - csharp
  - vb
  name: ObjectClass()
  nameWithType: ITopologyProtectNames.ObjectClass()
  fullName: ESRI.ArcGIS.Geodatabase.ITopologyProtectNames.ObjectClass()
  type: Method
  assemblies:
  - ESRI.Server.Geodatabase
  namespace: ESRI.ArcGIS.Geodatabase
  summary: ''
  remarks: >-
    &lt;P&gt;An object class is a table whose rows represent entities, modeled as objects with properties and behavior. The row objects handed out by an object class support the &lt;STRONG&gt;IRow &lt;/STRONG&gt;and the &lt;STRONG&gt;IObject &lt;/STRONG&gt;interfaces.&lt;/P&gt;

    &lt;P&gt;An object class may participate in any number of relationship classes that relate its instances to objects (entities) in other object classes.&lt;/P&gt;

    &lt;P&gt;An object class may contain a discriminating field, referred to as the subtype field that may be used to partition its instances into a number of subtypes. All subtypes share the same field definition and are stored in the same table, however individual subtypes may differ in the default values and domains assigned to fields. The subtyping mechanism can also be used in defining attribute and connectivity rules that apply to the instances of the object class. The subtyping mechanism is a lightweight alternative to creating multiple subclasses each represented by its own object class.&lt;/P&gt;

    &lt;P&gt;An object class has a non-negative object class ID which is unique within the geodatabase. This ID is assigned to the object class at the time that it is created or at the time that an existing table in the RDBMS is registered with the geodatabase as an object class. The &lt;STRONG&gt;Name &lt;/STRONG&gt;of the object class is the same as the name of the table in the DBMS in which the objects in the object class are stored and follows the same fully qualified naming conventions.&lt;/P&gt;

    &lt;P&gt;An object class may have an &lt;STRONG&gt;AliasName &lt;/STRONG&gt;property that is stored as part of its definition by the geodatabase. The &lt;STRONG&gt;AliasName &lt;/STRONG&gt;may be retrieved and used for display purposes by applications.&lt;/P&gt;

    &lt;P&gt;An object class may have a &lt;STRONG&gt;ModelName &lt;/STRONG&gt;property that is stored as part of its definition by the geodatabase. The model name is not exposed to end users and if defined, can be used as a search key to find an object class by a standard model name that is adhered to across databases. A model name must be unique across the workspace.&lt;BR&gt;&lt;/P&gt;
  example:
  - >-
    <codeTitle>Sample Snippet</codeTitle>

    <pre><code class="lang-csharp"></code></pre>
  syntax:
    content: void ObjectClass()
    content.vb: Sub ObjectClass()
  overload: ESRI.ArcGIS.Geodatabase.ITopologyProtectNames.ObjectClass*
