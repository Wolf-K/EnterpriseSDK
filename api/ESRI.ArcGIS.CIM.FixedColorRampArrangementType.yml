  langs:
  - csharp
  - vb
  name: Bivariate
  nameWithType: FixedColorRampArrangementType.Bivariate
  fullName: ESRI.ArcGIS.CIM.FixedColorRampArrangementType.Bivariate
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: A fixed list of colors for bivariate rendering. The count of colors should be equal to the number of breaks for each axis multiplied.
  remarks: For example, a 3x3 bivariate fixed list should have 9 colors in the order of A1, A2, A3, B1, B2, B3, C1, C2, C3 where values 1,2, and 3 correspond to classes in variable 1 and A, B, and C correspond to classes in variable 2.
  example: []
  syntax:
    content: Bivariate = 2
    return:
      type: ESRI.ArcGIS.CIM.FixedColorRampArrangementType
