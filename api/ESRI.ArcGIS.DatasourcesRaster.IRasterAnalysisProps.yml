- uid: ESRI.ArcGIS.DatasourcesRaster.IRasterAnalysisProps.RasterDataset
  commentId: P:ESRI.ArcGIS.DatasourcesRaster.IRasterAnalysisProps.RasterDataset
  id: RasterDataset
  parent: ESRI.ArcGIS.DatasourcesRaster.IRasterAnalysisProps
  langs:
  - csharp
  - vb
  name: RasterDataset
  nameWithType: IRasterAnalysisProps.RasterDataset
  fullName: ESRI.ArcGIS.DatasourcesRaster.IRasterAnalysisProps.RasterDataset
  type: Property
  assemblies:
  - ESRI.Server.DatasourcesRaster
  namespace: ESRI.ArcGIS.DatasourcesRaster
  summary: The RasterDataset, if there is one.
  remarks: >-
    &lt;P&gt;The &lt;STRONG&gt;RasterDataset&lt;/STRONG&gt; object represents a dataset on disk or in a database. It is composed of one or more persistent raster bands. The dataset provides access only to operations that apply to the entire dataset, with the &lt;STRONG&gt;RasterBand&lt;/STRONG&gt; providing access to operations that occur on individual bands.&lt;/P&gt;

    &lt;P&gt;The RasterDataset object performs basic dataset management functions, such as copy, rename, and delete. It can also instantiat RasterBand and &lt;STRONG&gt;Raster&lt;/STRONG&gt; objects representing other aspects of the data. It can be used to examine dataset properties including different format, extent, spatial reference, and number of bands.&lt;/P&gt;

    &lt;P&gt;The spatial reference of the raster raster dataset can be changed through interface &lt;STRONG&gt;IGeoDatasetSchemaEdit&lt;/STRONG&gt;, but it does not project the dataset, only changes the coordinate system associated with the dataset.&lt;BR&gt;The pyramid of the raster dataset can be built or rebuilt to improve display performance for large raster datasets.&lt;/P&gt;
  example:
  - >-
    <codeTitle>Sample Snippet</codeTitle>

    <pre><code class="lang-csharp"></code></pre>
  syntax:
    content: IRasterDataset RasterDataset { get; }
    parameters: []
    return:
      type: ESRI.ArcGIS.Geodatabase.IRasterDataset
    content.vb: ReadOnly Property RasterDataset As IRasterDataset
  overload: ESRI.ArcGIS.DatasourcesRaster.IRasterAnalysisProps.RasterDataset*
