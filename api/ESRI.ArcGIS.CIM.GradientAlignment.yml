  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: Buffered - Distributes the color ramp along the line's geometry from the outside in (similar to the effect of creating a buffer of the line, then using the "buffer" fill type).
  example: []
  syntax:
    content: Buffered = 0
    return:
      type: ESRI.ArcGIS.CIM.GradientAlignment
- uid: ESRI.ArcGIS.CIM.GradientAlignment.Left
