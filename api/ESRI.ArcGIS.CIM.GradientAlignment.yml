  fullName: ESRI.ArcGIS.CIM.GradientAlignment.Left
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: Left - Progresses the color ramp from the line's centerline to the outside edge on the left. The gradient will follow any curvature in the line's geometry.
  example: []
  syntax:
    content: Left = 1
    return:
      type: ESRI.ArcGIS.CIM.GradientAlignment
