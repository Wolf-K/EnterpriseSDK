  langs:
  - csharp
  - vb
  name: LeaderLineStyle
  nameWithType: LeaderLineStyle
  fullName: ESRI.ArcGIS.CIM.LeaderLineStyle
  type: Enum
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The style of line to generate when a leader is drawn defined by an enumeration value. Line leaders will always be drawn with their own geometry.
  example: []
  syntax:
    content: public enum LeaderLineStyle
    content.vb: Public Enum LeaderLineStyle
- uid: ESRI.ArcGIS.CIM.LeaderLineStyle.Base
  commentId: F:ESRI.ArcGIS.CIM.LeaderLineStyle.Base
  id: Base
  parent: ESRI.ArcGIS.CIM.LeaderLineStyle
  langs:
  - csharp
  - vb
  name: Base
  nameWithType: LeaderLineStyle.Base
  fullName: ESRI.ArcGIS.CIM.LeaderLineStyle.Base
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The line callout leader is a single line originating from the closest corner of the text box with the gap applied. If the callout has an accent bar it is connected to the closest point at the either top or bottom of the accent bar.
  example: []
  syntax:
    content: Base = 0
    return:
      type: ESRI.ArcGIS.CIM.LeaderLineStyle
- uid: ESRI.ArcGIS.CIM.LeaderLineStyle.MidPoint
  commentId: F:ESRI.ArcGIS.CIM.LeaderLineStyle.MidPoint
  id: MidPoint
  parent: ESRI.ArcGIS.CIM.LeaderLineStyle
  langs:
  - csharp
  - vb
  name: MidPoint
  nameWithType: LeaderLineStyle.MidPoint
  fullName: ESRI.ArcGIS.CIM.LeaderLineStyle.MidPoint
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The line callout leader is a single line originating from the midpoint of the left or right side of the text box with the gap applied or from the midpoint of the accent bar if the callout has one.
  example: []
  syntax:
    content: MidPoint = 1
    return:
      type: ESRI.ArcGIS.CIM.LeaderLineStyle
- uid: ESRI.ArcGIS.CIM.LeaderLineStyle.ThreePoint
  commentId: F:ESRI.ArcGIS.CIM.LeaderLineStyle.ThreePoint
  id: ThreePoint
  parent: ESRI.ArcGIS.CIM.LeaderLineStyle
  langs:
  - csharp
  - vb
  name: ThreePoint
  nameWithType: LeaderLineStyle.ThreePoint
  fullName: ESRI.ArcGIS.CIM.LeaderLineStyle.ThreePoint
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The line callout leader is a 3-point line originating from the midpoint of the left or right side of the text box with the gap applied or the midpoint of the accent bar if the callout has one.
  example: []
  syntax:
    content: ThreePoint = 2
    return:
      type: ESRI.ArcGIS.CIM.LeaderLineStyle
- uid: ESRI.ArcGIS.CIM.LeaderLineStyle.FourPoint
  commentId: F:ESRI.ArcGIS.CIM.LeaderLineStyle.FourPoint
  id: FourPoint
  parent: ESRI.ArcGIS.CIM.LeaderLineStyle
  langs:
  - csharp
  - vb
  name: FourPoint
  nameWithType: LeaderLineStyle.FourPoint
  fullName: ESRI.ArcGIS.CIM.LeaderLineStyle.FourPoint
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The line callout leader is a 4-point line originating from the midpoint of the left or right side of the text box with the gap applied or the midpoint of the accent bar if the callout has one.
  example: []
  syntax:
    content: FourPoint = 3
    return:
      type: ESRI.ArcGIS.CIM.LeaderLineStyle
- uid: ESRI.ArcGIS.CIM.LeaderLineStyle.Underline
  commentId: F:ESRI.ArcGIS.CIM.LeaderLineStyle.Underline
  id: Underline
  parent: ESRI.ArcGIS.CIM.LeaderLineStyle
  langs:
  - csharp
  - vb
  name: Underline
  nameWithType: LeaderLineStyle.Underline
  fullName: ESRI.ArcGIS.CIM.LeaderLineStyle.Underline
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The line callout draws a line that connects to the closest of the four corners of the text with the gap applied. If the callout has an accent bar it is connected to the closest point at either the top or bottom of the accent bar. Additionally, either and underline or an "overline" is drawn along the closest side (bottom or top) of the text.
  example: []
  syntax:
    content: Underline = 4
    return:
      type: ESRI.ArcGIS.CIM.LeaderLineStyle
- uid: ESRI.ArcGIS.CIM.LeaderLineStyle.CircularCW
  commentId: F:ESRI.ArcGIS.CIM.LeaderLineStyle.CircularCW
  id: CircularCW
  parent: ESRI.ArcGIS.CIM.LeaderLineStyle
  langs:
  - csharp
  - vb
  name: CircularCW
  nameWithType: LeaderLineStyle.CircularCW
  fullName: ESRI.ArcGIS.CIM.LeaderLineStyle.CircularCW
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The line callout leader is curved (clockwise) from the anchor point to the closest corner of the text box with the gap applied. If the callout has an accent bar it is connected to the closest point at the either top or bottom of the accent bar.
  example: []
  syntax:
    content: CircularCW = 5
    return:
      type: ESRI.ArcGIS.CIM.LeaderLineStyle
- uid: ESRI.ArcGIS.CIM.LeaderLineStyle.CircularCCW
  commentId: F:ESRI.ArcGIS.CIM.LeaderLineStyle.CircularCCW
  id: CircularCCW
  parent: ESRI.ArcGIS.CIM.LeaderLineStyle
  langs:
  - csharp
  - vb
  name: CircularCCW
  nameWithType: LeaderLineStyle.CircularCCW
  fullName: ESRI.ArcGIS.CIM.LeaderLineStyle.CircularCCW
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: The line callout leader is curved (counter-clockwise) from the anchor point to the closest corner of the text box with the gap applied. If the callout has an accent bar it is connected to the closest point at the either top or bottom of the accent bar.
  example: []
  syntax:
    content: CircularCCW = 6
    return:
      type: ESRI.ArcGIS.CIM.LeaderLineStyle
