- uid: ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportDefaults
  commentId: F:ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportDefaults
  id: esriShapeImportDefaults
  parent: ESRI.ArcGIS.Geometry.esriShapeImportFlags
  langs:
  - csharp
  - vb
  name: esriShapeImportDefaults
  nameWithType: esriShapeImportFlags.esriShapeImportDefaults
  fullName: ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportDefaults
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '0: Uses default import behavior: performs byte swapping if the current platform is Big-Endian (Sun, Motorola, etc.), assumes the geometry being imported is simple, and does not attach to the import buffer.'
  example: []
  syntax:
    content: esriShapeImportDefaults = 0
    return:
      type: ESRI.ArcGIS.Geometry.esriShapeImportFlags
- uid: ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportNoSwap
  commentId: F:ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportNoSwap
  id: esriShapeImportNoSwap
  parent: ESRI.ArcGIS.Geometry.esriShapeImportFlags
  langs:
  - csharp
  - vb
  name: esriShapeImportNoSwap
  nameWithType: esriShapeImportFlags.esriShapeImportNoSwap
  fullName: ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportNoSwap
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '1: Assumes shapefile standard byte ordering, regardless of current platform architecture. The default is to perform byte swapping if the current platform architecture is Big-Endian.'
  example: []
  syntax:
    content: esriShapeImportNoSwap = 1
    return:
      type: ESRI.ArcGIS.Geometry.esriShapeImportFlags
- uid: ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportNonTrusted
  commentId: F:ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportNonTrusted
  id: esriShapeImportNonTrusted
