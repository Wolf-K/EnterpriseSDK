  name: esriShapeImportNonTrusted
  nameWithType: esriShapeImportFlags.esriShapeImportNonTrusted
  fullName: ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportNonTrusted
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '2: Does not assume that the input shapefile buffer represents a topologically correct geometry.'
  example: []
  syntax:
    content: esriShapeImportNonTrusted = 2
    return:
      type: ESRI.ArcGIS.Geometry.esriShapeImportFlags
- uid: ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportAttach
  commentId: F:ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportAttach
  id: esriShapeImportAttach
