  fullName: ESRI.ArcGIS.Geometry.esriShapeImportFlags.esriShapeImportAttach
  type: Field
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: '4: Attaches the geometry directly to the input shapefile buffer. The geometry must be deleted, set to empty, edited, or imported from/attached to a different buffer before the buffer can be re-used, otherwise the buffer must be kept alive until geometry is destro'
  example: []
  syntax:
    content: esriShapeImportAttach = 4
    return:
      type: ESRI.ArcGIS.Geometry.esriShapeImportFlags
