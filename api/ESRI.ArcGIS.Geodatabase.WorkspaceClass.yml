    content.vb: Overridable ReadOnly Property WorkspaceFactory As IWorkspaceFactory
  overload: ESRI.ArcGIS.Geodatabase.WorkspaceClass.WorkspaceFactory*
  implements:
  - ESRI.ArcGIS.Geodatabase.IWorkspace.WorkspaceFactory
