- uid: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.DistanceAlong
  commentId: P:ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.DistanceAlong
  id: DistanceAlong
  parent: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine
  langs:
  - csharp
  - vb
  name: DistanceAlong
  nameWithType: CIMSymbolAnimationMoveAlongLine.DistanceAlong
  fullName: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.DistanceAlong
  type: Property
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: >-
    Gets or sets the distance as a percentage along the line to which the marker will animate.

    0 corresponds to the starting placement of the marker, and 100 corresponds to a full movement along the line.

    This is only used if MovementType is set to Distance.
  example: []
  syntax:
    content: public double DistanceAlong { get; set; }
    parameters: []
    return:
      type: System.Double
    content.vb: Public Property DistanceAlong As Double
  overload: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.DistanceAlong*
- uid: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.Speed
  commentId: P:ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.Speed
  id: Speed
  parent: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine
  langs:
  - csharp
  - vb
  name: Speed
  nameWithType: CIMSymbolAnimationMoveAlongLine.Speed
  fullName: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.Speed
  type: Property
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: >-
    Gets or sets the speed at which the marker will animate along the line, in units of the line's unit per second.

    When the MovementType is set to Distance, the marker will move along the line at this speed until it reaches the DistanceAlong value.

    When the MovementType is set to Speed, the marker will move along the line at this speed, and DistanceAlong is ignored.
  example: []
  syntax:
    content: public double Speed { get; set; }
    parameters: []
    return:
      type: System.Double
    content.vb: Public Property Speed As Double
  overload: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.Speed*
- uid: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.Continuous
  commentId: P:ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.Continuous
  id: Continuous
  parent: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine
  langs:
  - csharp
  - vb
  name: Continuous
  nameWithType: CIMSymbolAnimationMoveAlongLine.Continuous
  fullName: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.Continuous
  type: Property
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: >-
    Gets or sets a value indicating whether the animation will loop continuously when Speed is defined.

    If true, once the marker reaches the end of the line it will jump back to the starting placement and repeat the animation continuously until the duration is reached.
  example: []
  syntax:
    content: public bool Continuous { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property Continuous As Boolean
  overload: ESRI.ArcGIS.CIM.CIMSymbolAnimationMoveAlongLine.Continuous*
