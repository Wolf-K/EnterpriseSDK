  type: Class
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: Represents the move along line animation.
  remarks: >-
    Dynamically animates marker(s) along a line. The animation can be defined by either distance along the line or speed.

    The initial marker placement for the animation is determined by the MarkerPlacement property on the symbol layer, and the animation will move the marker(s) from that initial placement along the line.
