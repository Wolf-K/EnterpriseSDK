- uid: ESRI.ArcGIS.Geodatabase.IField.GeometryDef
  commentId: P:ESRI.ArcGIS.Geodatabase.IField.GeometryDef
  id: GeometryDef
  parent: ESRI.ArcGIS.Geodatabase.IField
  langs:
  - csharp
  - vb
  name: GeometryDef
  nameWithType: IField.GeometryDef
  fullName: ESRI.ArcGIS.Geodatabase.IField.GeometryDef
  type: Property
  assemblies:
  - ESRI.Server.Geodatabase
  namespace: ESRI.ArcGIS.Geodatabase
  summary: The geometry definition for the field if IsGeometry is TRUE.
  remarks: >-
    &lt;P&gt;The &lt;STRONG&gt;GeometryDef&lt;/STRONG&gt; object defines the spatial qualities of a feature class. The most fundmental spatial quality is the Geometry type, for example, point, line, and polygon. Other information necessary to define the feature class includes the spatial referencing system, whether the vertices have height or measure data, and, for geodatabases, the spatial index parameters.&lt;/P&gt;

    &lt;P&gt;The &lt;STRONG&gt;GeometryDef &lt;/STRONG&gt;can be accessed from a shape field, that is a field of type &lt;STRONG&gt;esriFieldTypeGeometry&lt;/STRONG&gt;. The actual geometry type is defined by the &lt;STRONG&gt;esriGeometryType &lt;/STRONG&gt;enumeration, though currently only four values are acceptable with respect to &lt;STRONG&gt;GeometryDef &lt;/STRONG&gt;objects: &lt;STRONG&gt;esriGeometryPoint&lt;/STRONG&gt;, &lt;STRONG&gt;esriGeometryMultipoint&lt;/STRONG&gt;, &lt;STRONG&gt;esriGeometryPolyline&lt;/STRONG&gt;, and &lt;STRONG&gt;esriGeometryPolygon&lt;/STRONG&gt;.&lt;/P&gt;

    &lt;P&gt;Beware of the confusion between the &lt;STRONG&gt;esriGeometryType&lt;/STRONG&gt; enumeration and the similarly named &lt;STRONG&gt;esriFeatureType&lt;/STRONG&gt; and &lt;STRONG&gt;esriShapeType&lt;/STRONG&gt;. The following table shows the different roles of those enumerations.&lt;/P&gt;

    &lt;DIV class=tablediv&gt;

    &lt;TABLE class=dtTABLE cellSpacing=0&gt;

    &lt;TBODY&gt;

    &lt;TR vAlign=top&gt;

    &lt;TH class=t width="33%"&gt;ArcObjects Enumeration&lt;/TH&gt;

    &lt;TH class=t width="33%"&gt;Values&lt;/TH&gt;

    &lt;TH class=t width="33%"&gt;Interfaces that use the enumeration&lt;/TH&gt;&lt;/TR&gt;

    &lt;TR vAlign=top&gt;

    &lt;TD width="33%"&gt;&lt;STRONG&gt;esriGeometryType&lt;/STRONG&gt;&lt;BR&gt;&lt;BR&gt;Type of geometry in a geodatabase. Those in bold are valid for feature classes, others are component geometry objects.&lt;/TD&gt;

    &lt;TD class=t width="33%"&gt;&lt;STRONG&gt;esriGeometryPoint&lt;BR&gt;esriGeometryMultipoint&lt;BR&gt;esriGeometryPolygon&lt;BR&gt;esriGeometryPolyline&lt;BR&gt;esriGeometryLine&lt;/STRONG&gt;&lt;BR&gt;esriGeometryCircularArc&lt;BR&gt;esriGeometryEllipticArc&lt;BR&gt;esriGeometryBezier3Curve&lt;BR&gt;esriGeometryPath&lt;BR&gt;esriGeometryNull&lt;BR&gt;esriGeometryRing&lt;BR&gt;esriGeometryEnvelope&lt;BR&gt;esriGeometryAny&lt;BR&gt;esriGeometryBag&lt;BR&gt;esriGeometryMultiPatch&lt;BR&gt;esriGeometryTriangleStrip&lt;BR&gt;esriGeometryTriangleFan&lt;BR&gt;esriGeometryRay&lt;BR&gt;esriGeometrySphere&lt;BR&gt;esriGeometryTriangles&lt;BR&gt;&lt;/TD&gt;

    &lt;TD width="33%"&gt;IFeatureClass::ShapeType&lt;BR&gt;IGeometry::GeometryType&lt;BR&gt;IGeometryDef::GeometryType&lt;BR&gt;&lt;BR&gt;also&lt;BR&gt;IGeometryDefEdit,&lt;BR&gt;IGeometryFactory,&lt;BR&gt;IEditSketchExtension,&lt;BR&gt;IGridConversionOp,&lt;BR&gt;IDimensionConstructor&lt;/TD&gt;&lt;/TR&gt;

    &lt;TR vAlign=top&gt;

    &lt;TD width="33%"&gt;&lt;STRONG&gt;esriFeatureType&lt;/STRONG&gt;&lt;BR&gt;&lt;BR&gt;Feature types defined by&lt;BR&gt;feature class extensions&lt;/TD&gt;

    &lt;TD class=t width="33%"&gt;esriFTSimple&lt;BR&gt;esriFTSimpleJunction&lt;BR&gt;esriFTSimpleEdge&lt;BR&gt;esriFTComplexJunction&lt;BR&gt;esriFTComplexEdge&lt;BR&gt;esriFTAnnotation&lt;BR&gt;esriFTCoverageAnnotation&lt;BR&gt;esriFTDimension&lt;BR&gt;esriFTRasterCatalogItem&lt;BR&gt;&lt;/TD&gt;

    &lt;TD width="33%"&gt;IFeature::FeatureType&lt;BR&gt;IFeatureClass::FeatureType&lt;BR&gt;IFeatureClassDescription::FeatureType&lt;BR&gt;IFeatureWorkspace::CreateFeatureClass&lt;BR&gt;IFeatureDataset::CreateFeatureClass&lt;BR&gt;&lt;BR&gt;also, IGeometricNetwork and&lt;BR&gt;INetworkLoader&lt;/TD&gt;&lt;/TR&gt;

    &lt;TR vAlign=top&gt;

    &lt;TD width="33%"&gt;&lt;STRONG&gt;esriShapeType&lt;/STRONG&gt;&lt;BR&gt;&lt;BR&gt;Type of geometry in a&lt;BR&gt;shapefile&lt;/TD&gt;

    &lt;TD class=t width="33%"&gt;See the help for esriShapeType&lt;BR&gt;for a full list &lt;/TD&gt;

    &lt;TD width="33%"&gt;IFeature::FeatureType&lt;BR&gt;IFeatureClass::FeatureType&lt;BR&gt;IFeatureClassDescription::FeatureType&lt;BR&gt;IFeatureWorkspace::CreateFeatureClass&lt;BR&gt;IFeatureDataset::CreateFeatureClass&lt;BR&gt;&lt;BR&gt;also, IGeometricNetwork and&lt;BR&gt;INetworkLoader&lt;/TD&gt;&lt;/TR&gt;&lt;/TBODY&gt;&lt;/TABLE&gt;&lt;/DIV&gt;
  example:
  - >-
    <codeTitle>Sample Snippet</codeTitle>

    <pre><code class="lang-csharp"></code></pre>
  syntax:
    content: IGeometryDef GeometryDef { get; }
    parameters: []
    return:
      type: ESRI.ArcGIS.Geodatabase.IGeometryDef
    content.vb: ReadOnly Property GeometryDef As IGeometryDef
  overload: ESRI.ArcGIS.Geodatabase.IField.GeometryDef*
