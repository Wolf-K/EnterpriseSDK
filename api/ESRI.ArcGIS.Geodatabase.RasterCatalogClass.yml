- uid: ESRI.ArcGIS.Geodatabase.RasterCatalogClass.Workspace
  commentId: P:ESRI.ArcGIS.Geodatabase.RasterCatalogClass.Workspace
  id: Workspace
  isEii: true
  parent: ESRI.ArcGIS.Geodatabase.RasterCatalogClass
  langs:
  - csharp
  - vb
  name: Workspace
  nameWithType: RasterCatalogClass.Workspace
  fullName: ESRI.ArcGIS.Geodatabase.RasterCatalogClass.Workspace
  type: Property
  assemblies:
  - ESRI.Server.Geodatabase
  namespace: ESRI.ArcGIS.Geodatabase
  summary: The workspace containing this dataset.
  remarks: '&lt;p&gt;A Workspace is a container of spatial and non-spatial datasets such as feature classes, raster datasets, and tables. It provides methods to instantiate existing datasets and to create new datasets. Workspaces are classified into types specified by the &lt;b&gt;&lt;a href="esriWorkspaceType.htm"&gt;esriWorkspaceType&lt;/a&gt;&lt;/b&gt; enumerator: FileSystemWorkspace, LocalDatabaseWorkspace, and RemoteDatabaseWorkspace. Shapefiles and ArcGIS for Desktop Advanced workspaces are examples of FileSystemWorkspace. A personal geodatabase stored in an Access or a File Geodatabase is an example of a LocalDatabaseWorkspace. A geodatabase stored in an RDBMS such as Oracle, DB2, SQL Server, or Informix and accessed via ArcSDE is an example of a RemoteDatabaseWorkspace.&lt;/p&gt;&amp;nbsp;&lt;p&gt;A Workspace hands out a &lt;b&gt;&lt;a href="WorkspaceName.htm"&gt;WorkspaceName&lt;/a&gt;&amp;nbsp;&lt;/b&gt;object as the value of its FullName property. For example, the WorkspaceName for a workspace can be persisted in a map document. An application can call the &lt;b&gt;Open()&lt;/b&gt; method on the workspace name after loading it from persistent storage to connect to and get an object reference to the workspace.&lt;/p&gt;'
  example:
  - >-
    <codeTitle>Sample Snippet</codeTitle>

    <pre><code class="lang-csharp"></code></pre>
  syntax:
    content: virtual IWorkspace Workspace { get; }
    parameters: []
    return:
      type: ESRI.ArcGIS.Geodatabase.IWorkspace
    content.vb: Overridable ReadOnly Property Workspace As IWorkspace
  overload: ESRI.ArcGIS.Geodatabase.RasterCatalogClass.Workspace*
  implements:
  - ESRI.ArcGIS.Geodatabase.IDataset.Workspace
