- uid: ESRI.ArcGIS.CIM.GeometricEffectEnclosingPolygonMethod.ClosePath
  commentId: F:ESRI.ArcGIS.CIM.GeometricEffectEnclosingPolygonMethod.ClosePath
  id: ClosePath
  parent: ESRI.ArcGIS.CIM.GeometricEffectEnclosingPolygonMethod
  langs:
  - csharp
