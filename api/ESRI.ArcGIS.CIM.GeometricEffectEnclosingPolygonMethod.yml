  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: ConvexHull - for polygon input, it generates a polygon with a minimum number of sides to surround the feature. For line input, it generates a polygon that approximates the shape of the line.
  example: []
  syntax:
    content: ConvexHull = 1
    return:
      type: ESRI.ArcGIS.CIM.GeometricEffectEnclosingPolygonMethod
