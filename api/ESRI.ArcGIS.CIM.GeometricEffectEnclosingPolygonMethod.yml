  name: ClosePath
  nameWithType: GeometricEffectEnclosingPolygonMethod.ClosePath
  fullName: ESRI.ArcGIS.CIM.GeometricEffectEnclosingPolygonMethod.ClosePath
  type: Field
  assemblies:
  - ESRI.Server.CIM
  namespace: ESRI.ArcGIS.CIM
  summary: ClosePath - for polygon input, it generates a polygon that matches the geometry of a polygon feature. For line input, it generates a polygon that connects both ends of the line to each other.
  example: []
  syntax:
    content: ClosePath = 0
    return:
      type: ESRI.ArcGIS.CIM.GeometricEffectEnclosingPolygonMethod
- uid: ESRI.ArcGIS.CIM.GeometricEffectEnclosingPolygonMethod.ConvexHull
