  summary: Indicate whether to include and/or modify Geometry.
  remarks: >-
    &lt;P&gt;Use&amp;nbsp;&lt;A href="javascript:Jump('esriCarto/LayerResultOptions.htm')"&gt;&lt;STRONG&gt;LayerResultOptions&lt;/STRONG&gt;&lt;/A&gt;&amp;nbsp;when you want to customize the results of a MapServer query - for example, when you want field names (instead of field aliases)&amp;nbsp;or data in native format or in some cases you may want to&amp;nbsp;limit or adjust the geometry being returned.&lt;/P&gt;

    &lt;P&gt;Since&amp;nbsp;LayerResultsOptions&amp;nbsp;is part of of the LayerDescription any settings made for LayerResultsOptions will only affect those methods&amp;nbsp;that include&amp;nbsp;the LayerDescription (or MapDescription whcih contains LayerDescriptions)&amp;nbsp;as a parameter. These include &lt;A href="javascript:Jump('esriCarto/IMapServer2_Find.htm')"&gt;&lt;STRONG&gt;Find&lt;/STRONG&gt;&lt;/A&gt;, &lt;A href="javascript:Jump('esriCarto/IMapServer2_Identify.htm')"&gt;&lt;STRONG&gt;Identify&lt;/STRONG&gt;&lt;/A&gt;, &lt;STRONG&gt;&lt;A href="javascript:Jump('esriCarto/IMapServer3_QueryData.htm')"&gt;QueryData&lt;/A&gt;&lt;/STRONG&gt;,&amp;nbsp;&lt;STRONG&gt;&lt;A href="javascript:Jump('esriCarto/IMapServer3_QueryRowIDs.htm')"&gt;QueryRowIDs&lt;/A&gt;&lt;/STRONG&gt;, &lt;STRONG&gt;&lt;A href="javascript:Jump('esriCarto/IMapServer3_QueryRowCount.htm')"&gt;QueryRowCount&lt;/A&gt;&lt;/STRONG&gt;,&amp;nbsp;&lt;A href="javascript:Jump('esriCarto/IMapServer2_QueryFeatureCount2.htm')"&gt;&lt;STRONG&gt;QueryFeatureCount2&lt;/STRONG&gt;&lt;/A&gt;, &lt;A href="javascript:Jump('esriCarto/IMapServer_QueryFeatureIDs2.htm')"&gt;&lt;STRONG&gt;QueryFeatureIDs2&lt;/STRONG&gt;&lt;/A&gt;,&amp;nbsp;&lt;A href="javascript:Jump('esriCarto/IMapServer2_QueryFeatureData2.htm')"&gt;&lt;STRONG&gt;QueryFeatureData2&lt;/STRONG&gt;&lt;/A&gt; and &lt;A href="javascript:Jump('esriCarto/IMapServer_QueryHyperlinks.htm')"&gt;&lt;STRONG&gt;QueryHyperlinks&lt;/STRONG&gt;&lt;/A&gt;. QueryHyperLinks always returns geometry regardless InlcudeGeometry’s value, but honors GeometryResultOptions.&lt;/P&gt;
