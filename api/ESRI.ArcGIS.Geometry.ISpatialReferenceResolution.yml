  type: Method
  assemblies:
  - ESRI.Server.Geometry
  namespace: ESRI.ArcGIS.Geometry
  summary: Defines the XY resolution and domain extent of this spatial reference based on the extent of its horizon. Low precision SRs will have minimum resolution of 1/10mm in current units.
