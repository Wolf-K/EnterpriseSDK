    parameters:
    - id: authority
      type: System.String
    - id: wkid
      type: System.Int32
    - id: WKID_Z
      type: System.Int32
    - id: bDefaultXYResolution
      type: System.Boolean
    - id: bDefaultXYTolerance
      type: System.Boolean
    return:
      type: ESRI.ArcGIS.Geometry.ISpatialReference
    content.vb: Function FindSRByWKID(authority As String, wkid As Integer, WKID_Z As Integer, bDefaultXYResolution As Boolean, bDefaultXYTolerance As Boolean) As ISpatialReference
